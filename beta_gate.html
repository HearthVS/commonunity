<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CommonUnity Private Beta</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #030306;
      --text: #f7f3ea;
      --muted: rgba(247, 243, 234, 0.72);
      --faint: rgba(247, 243, 234, 0.5);
      --line: rgba(247, 243, 234, 0.16);
      --gold: #c49a57;
      --rose: #bf7c92;
      --blue: #6c8fc5;
      --green: #74a487;
      --shadow: rgba(0, 0, 0, 0.42);
      color-scheme: dark;
    }
    html { min-height: 100%; background: var(--bg); }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.16), transparent 28rem),
        radial-gradient(circle at 18% 30%, rgba(196,154,87,0.18), transparent 26rem),
        radial-gradient(circle at 78% 22%, rgba(108,143,197,0.16), transparent 24rem),
        radial-gradient(circle at 58% 86%, rgba(191,124,146,0.14), transparent 28rem),
        linear-gradient(135deg, #030306 0%, #07070c 58%, #030306 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.24;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 50% 35%, black, transparent 72%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image: radial-gradient(rgba(255,255,255,0.55) 0.7px, transparent 0.8px);
      background-size: 3px 3px;
      mix-blend-mode: screen;
    }
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(28px, 6vw, 88px) 20px;
    }
    main {
      width: min(100%, 720px);
      text-align: center;
      padding: clamp(28px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025)),
        rgba(5, 5, 9, 0.58);
      box-shadow: 0 28px 80px var(--shadow);
      backdrop-filter: blur(22px);
    }
    .mark {
      width: 88px;
      height: 88px;
      margin: 0 auto 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        conic-gradient(from 20deg, var(--gold), var(--rose), var(--blue), var(--green), var(--gold));
      box-shadow: 0 0 54px rgba(196,154,87,0.28);
      animation: breathe 8s ease-in-out infinite;
    }
    .mark span {
      width: 72px;
      height: 72px;
      border-radius: inherit;
      display: grid;
      place-items: center;
      background: rgba(3, 3, 6, 0.88);
      color: rgba(247,243,234,0.92);
      font-size: 24px;
      letter-spacing: 0.16em;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 500;
    }
    .lede {
      max-width: 52ch;
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.2vw, 1.15rem);
      line-height: 1.75;
    }
    form {
      display: grid;
      gap: 14px;
      width: min(100%, 420px);
      margin: 34px auto 0;
      text-align: left;
    }
    label {
      display: block;
      margin: 0 0 8px;
      color: var(--faint);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(247,243,234,0.18);
      border-radius: 999px;
      padding: 0 18px;
      color: var(--text);
      background: rgba(0,0,0,0.26);
      outline: none;
      font: inherit;
    }
    input:focus {
      border-color: rgba(196,154,87,0.74);
      box-shadow: 0 0 0 4px rgba(196,154,87,0.12);
    }
    button, .home-link {
      min-height: 52px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font: inherit;
    }
    button {
      width: 100%;
      border: 1px solid rgba(247,243,234,0.32);
      color: #090907;
      background: linear-gradient(135deg, #f5e7bd, #c49a57);
      cursor: pointer;
      box-shadow: 0 18px 48px rgba(196,154,87,0.22);
    }
    .home-link {
      margin-top: 18px;
      color: var(--faint);
    }
    .error {
      display: none;
      margin: 16px 0 0;
      color: #f1b5b5;
      font-size: 0.95rem;
    }
    .has-error .error { display: block; }
    .hp { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); filter: saturate(0.9); }
      50% { transform: scale(1.035); filter: saturate(1.18); }
    }
    @media (prefers-reduced-motion: reduce) {
      .mark { animation: none; }
    }
    @media (max-width: 560px) {
      main { border-radius: 28px; padding: 28px 20px; }
      .mark { width: 76px; height: 76px; }
      .mark span { width: 62px; height: 62px; font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main id="gate">
      <div class="mark" aria-hidden="true"><span>OM</span></div>
      <p class="eyebrow">Private beta</p>
      <h1 id="title">CommonUnity is opening by invitation.</h1>
      <p class="lede" id="copy">
        This part of the field is currently held for invited beta companions and guides.
        Use your magic link, or enter the shared beta code you were given.
      </p>
      <p class="error" id="error">That code did not open the gate. Please check it and try again.</p>
      <form method="post" action="/api/beta/unlock">
        <input type="hidden" name="next" id="next" value="/compass">
        <div class="hp" aria-hidden="true">
          <label for="website">Website</label>
          <input id="website" name="website" type="text" autocomplete="off" tabindex="-1">
        </div>
        <div>
          <label for="code">Beta access code</label>
          <input id="code" name="code" type="password" autocomplete="one-time-code" required>
        </div>
        <button type="submit">Enter the field</button>
      </form>
      <a class="home-link" href="/">Return to CommonUnity</a>
    </main>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const pathNext = window.location.pathname && window.location.pathname !== '/beta'
        ? window.location.pathname
        : (params.get('next') || '/compass');
      const allowed = ['/compass', '/studio', '/tuner', '/commons', '/threshold'];
      const next = allowed.includes(pathNext) ? pathNext : '/compass';
      document.getElementById('next').value = next;
      if (params.get('error') === '1') document.getElementById('gate').classList.add('has-error');
      const names = { '/compass': 'cOMpass', '/studio': 'Studio', '/tuner': 'Tuner', '/commons': 'cOMmons', '/threshold': 'the threshold' };
      const app = names[next] || 'CommonUnity';
      document.getElementById('title').textContent = app + ' is opening by invitation.';
      document.getElementById('copy').textContent = 'This entrance is currently held for invited beta companions and guides. Use your magic link, or enter the shared beta code you were given.';
    })();
  </script>
</body>
</html>
