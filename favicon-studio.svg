<svg viewBox="0 0 100 100" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CommonUnity Studio">
  <title>CommonUnity Studio (beta)</title>
  <defs>
    <radialGradient id="su-aura" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.34"/>
      <stop offset="45%" stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="su-vessel" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#0b1120"/>
  <circle cx="50" cy="46" r="44" fill="url(#su-aura)"/>
  <!-- Capital U / U-vessel: open cup that holds the glow -->
  <path d="M30 26 V52 a20 20 0 0 0 40 0 V26"
        fill="none" stroke="url(#su-vessel)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- glow held within the vessel -->
  <circle cx="50" cy="54" r="9" fill="#fde68a" fill-opacity="0.85"/>
  <circle cx="50" cy="54" r="3" fill="#fef9ee" fill-opacity="0.95"/>
</svg>
